    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>أذكار بعد الصلاة - adkarmusliam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Amiri', serif; background-color: #f0fdf4; }
        .clickable-area:active { transform: scale(0.99); transition: transform 0.1s; }
    </style>
</head>
<body class="p-4 md:p-8">
    <header class="max-w-4xl mx-auto text-center mb-10">
        <h1 class="text-4xl font-bold text-emerald-800 mb-2">أذكار بعد الصلاة</h1>
        <p class="text-emerald-600">حصن المسلم - المصدر: إسلام بوك</p>
		       <a href="https://adkaralmusliam.github.io/adkaralmusliam/" 
   class="fixed top-4 right-4 z-50 bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-full shadow-lg flex items-center gap-2 transition-all duration-300 group">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
    </svg>
    <span class="font-bold">الرجوع للرئيسية</span>
</a>
    </header>

    <main id="azkar-container" class="max-w-4xl mx-auto space-y-4">
        </main>

    <script>
        // قاعدة بيانات أذكار المساء من موقع إسلام بوك
        const azkarData = [    {
        text: "أَسْـتَغْفِرُ الله، أَسْـتَغْفِرُ الله، أَسْـتَغْفِرُ الله. اللّهُـمَّ أَنْـتَ السَّلامُ ، وَمِـنْكَ السَّلام ، تَبارَكْتَ يا ذا الجَـلالِ وَالإِكْـرام.",
        maxCount: 1,
        currentCount: 1
    },
    {
        text: "لا إلهَ إلاّ اللّهُ وحدَهُ لا شريكَ لهُ، لهُ المُـلْكُ ولهُ الحَمْد، وهوَ على كلّ شَيءٍ قَدير، اللّهُـمَّ لا مانِعَ لِما أَعْطَـيْت، وَلا مُعْطِـيَ لِما مَنَـعْت، وَلا يَنْفَـعُ ذا الجَـدِّ مِنْـكَ الجَـد.",
        maxCount: 1,
        currentCount: 1
    },
    {
        text: "لا إلهَ إلاّ اللّه, وحدَهُ لا شريكَ لهُ، لهُ الملكُ ولهُ الحَمد، وهوَ على كلّ شيءٍ قدير، لا حَـوْلَ وَلا قـوَّةَ إِلاّ بِاللهِ، لا إلهَ إلاّ اللّـه، وَلا نَعْـبُـدُ إِلاّ إيّـاه, لَهُ النِّعْـمَةُ وَلَهُ الفَضْل وَلَهُ الثَّـناءُ الحَـسَن، لا إلهَ إلاّ اللّهُ مخْلِصـينَ لَـهُ الدِّينَ وَلَوْ كَـرِهَ الكـافِرون.",
        maxCount: 1,
        currentCount: 1
    },
    {
        text: "سُـبْحانَ اللهِ (33)، والحَمْـدُ لله (33)، واللهُ أكْـبَر (33).",
        note: "تسبح وتحمد وتكبر ثلاثاً وثلاثين مرة.",
        maxCount: 33,
        currentCount: 33
    },
    {
        text: "لا إلهَ إلاّ اللّهُ وَحْـدَهُ لا شريكَ لهُ، لهُ الملكُ ولهُ الحَمْد، وهُوَ على كُلّ شَيءٍ قَـدير.",
        note: "تمام المائة بعد التسبيح والتحميد والتكبير.",
        maxCount: 1,
        currentCount: 1
    },
    {
        title: "المعوذات",
        text: "بِسْمِ اللهِ الرَّحْمنِ الرَّحِيم (قُلْ هُوَ ٱللَّهُ أَحَدٌ...)، بِسْمِ اللهِ الرَّحْمنِ الرَّحِيم (قُلْ أَعُوذُ بِرَبِّ ٱلْفَلَقِ...)، بِسْمِ اللهِ الرَّحْمنِ الرَّحِيم (قُلْ أَعُوذُ بِرَبِّ ٱلنَّاسِ...).",
        note: "ثلاث مرات بعد الفجر والمغرب، ومرة بعد بقية الصلوات.",
        maxCount: 3,
        currentCount: 3
    },
    {
        title: "آية الكرسي",
        text: "أَعُوذُ بِاللهِ مِنْ الشَّيْطَانِ الرَّجِيمِ: اللّهُ لاَ إِلَـهَ إِلاَّ هُوَ الْحَيُّ الْقَيُّومُ لاَ تَأْخُذُهُ سِنَةٌ وَلاَ نَوْمٌ لَّهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الأَرْضِ مَن ذَا الَّذِي يَشْفَعُ عِنْدَهُ إِلاَّ بِإِذْنِهِ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ وَلاَ يُحِيطُونَ بِشَيْءٍ مِّنْ عِلْمِهِ إِلاَّ بِمَا شَاء وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالأَرْضَ وَلاَ يَؤُودُهُ حِفْظُهُمَا وَهُوَ الْعَلِيُّ الْعَظِيمُ.",
        maxCount: 1,
        currentCount: 1
    },
    {
        text: "لا إلهَ إلاّ اللّهُ وحْـدَهُ لا شريكَ لهُ، لهُ المُلكُ ولهُ الحَمْد، يُحيـي وَيُمـيتُ وهُوَ على كُلّ شيءٍ قدير.",
        note: "عشر مرات بعد صلاتي المغرب والصبح.",
        maxCount: 10,
        currentCount: 10
    },
    {
        text: "اللّهُـمَّ إِنِّـي أَسْأَلُـكَ عِلْمـاً نافِعـاً وَرِزْقـاً طَيِّـباً ، وَعَمَـلاً مُتَقَـبَّلاً.",
        note: "بعد السلام من صلاة الفجر.",
        maxCount: 1,
        currentCount: 1
    },
    {
        text: "اللَّهُمَّ أَجِرْنِي مِنْ النَّار.",
        note: "سبع مرات بعد صلاة الصبح والمغرب.",
        maxCount: 7,
        currentCount: 7
    },
    {
        text: "اللَّهُمَّ أَعِنِّي عَلَى ذِكْرِكَ وَشُكْرِكَ وَحُسْنِ عِبَادَتِكَ.",
        maxCount: 1,
        currentCount: 1
    }
];

        function renderAzkar() {
            const container = document.getElementById('azkar-container');
            container.innerHTML = '';
            
            azkarData.forEach((zekr, index) => {
                const isDone = zekr.currentCount === 0;
                const cardClass = isDone ? 'opacity-50 grayscale bg-gray-50 border-gray-200' : 'bg-white border-emerald-200 hover:border-emerald-400';
                const counterClass = isDone ? 'bg-gray-400' : 'bg-emerald-600';
                
                const titleHtml = zekr.title ? `<div class="text-emerald-700 font-bold text-center mb-3 text-lg">${zekr.title}</div>` : '';
                const noteHtml = zekr.note ? `<div class="mt-4 bg-emerald-50 border-r-4 border-emerald-500 p-3 rounded-md text-emerald-800 text-sm italic">${zekr.note}</div>` : '';

                container.innerHTML += `
                    <div class="rounded-xl shadow-md border overflow-hidden transition-all duration-300 ${cardClass}">
                        <div class="grid grid-cols-1 md:grid-cols-[1fr_auto]">
                            <div class="p-6 cursor-pointer clickable-area select-none" onclick="decrement(${index})">
                                ${titleHtml}
                                <p class="text-gray-900 text-justify leading-loose text-xl">${zekr.text}</p>
                                ${noteHtml}
                            </div>
                            <div class="${counterClass} text-white flex md:flex-col items-center justify-between md:justify-center gap-3 p-4 md:min-w-[110px]">
                                <div class="text-center">
                                    <div class="text-3xl font-bold">${zekr.currentCount}</div>
                                    <div class="text-emerald-100 text-xs mt-1">من ${zekr.maxCount}</div>
                                </div>
                                <button onclick="reset(${index}, event)" class="bg-black/20 hover:bg-black/30 px-3 py-1 rounded text-xs">إعادة</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function decrement(index) {
            if (azkarData[index].currentCount > 0) {
                azkarData[index].currentCount--;
                renderAzkar();
            }
        }

        function reset(index, event) {
            event.stopPropagation();
            azkarData[index].currentCount = azkarData[index].maxCount;
            renderAzkar();
        }

        renderAzkar();
    </script>
</body>
</html>
